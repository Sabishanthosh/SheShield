<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – SheShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <a href="../index.html" class="auth-logo">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">She<span class="logo-accent">Shield</span></span>
      </a>

      <h1 class="auth-title" id="authTitle">Welcome back</h1>
      <p class="auth-sub" id="authSub">Login to sync your contacts & records across devices.</p>

      <!-- Error/Success message -->
      <div class="auth-msg" id="authMsg" style="display:none;"></div>

      <!-- Google Sign-in -->
      <button class="google-btn" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.08-1.79 2.72v2.26h2.9c1.7-1.57 2.69-3.88 2.69-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.36 0-4.36-1.59-5.08-3.73H.86v2.34C2.34 16.05 5.4 18 9 18z"/><path fill="#FBBC05" d="M3.92 10.69A5.4 5.4 0 0 1 3.64 9c0-.59.1-1.16.28-1.69V4.97H.86A8.96 8.96 0 0 0 0 9c0 1.45.35 2.83.86 4.03l3.06-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.57-2.57C13.46.89 11.43 0 9 0 5.4 0 2.34 1.95.86 4.97l3.06 2.34C4.64 5.17 6.64 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <!-- Email/Password form -->
      <form id="authForm" class="auth-form">
        <input type="email" id="emailInput" class="form-input" placeholder="Email address" required />
        <input type="password" id="passwordInput" class="form-input" placeholder="Password" required minlength="6" />
        <button type="submit" class="auth-submit-btn" id="authSubmitBtn">Login</button>
      </form>

      <p class="auth-switch">
        <span id="switchText">Don't have an account?</span>
        <button id="switchBtn" type="button">Sign up</button>
      </p>

      <a href="../index.html" class="auth-skip">Continue without login →</a>

    </div>
  </div>

  <!-- Firebase SDKs (compat, CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
